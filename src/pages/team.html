<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
</head>
<body>
  <div class="page">
    <nav class="nav-bar">
      <span class="nav-bar__title">Team</span>
    </nav>

    <div id="team-container">
      <div class="loading">Loading&hellip;</div>
    </div>
  </div>

  <script type="module">
    import { initSidebar } from '../components/sidebar.js';
    import {
      fetchTeam, fetchTeamStats, fetchStandings, findTeamStanding,
      fetchTeamSchedule, fetchRoster, getLogoUrl, getGameTime, getInningDisplay,
    } from '../utils/api.js';

    initSidebar();

    const teamId = parseInt(new URLSearchParams(window.location.search).get('id'), 10);
    const container = document.getElementById('team-container');

    if (!teamId) {
      container.innerHTML = '<div class="error-msg">No team ID specified.</div>';
    } else {
      loadTeam(teamId);
    }

    async function loadTeam(id) {
      try {
        const [team, standingsData, hitting, pitching, fielding] = await Promise.all([
          fetchTeam(id),
          fetchStandings(),
          fetchTeamStats(id, 'hitting'),
          fetchTeamStats(id, 'pitching'),
          fetchTeamStats(id, 'fielding'),
        ]);
        if (!team) throw new Error('Team not found.');
        const standing = findTeamStanding(standingsData, id);
        render(team, standing, hitting, pitching, fielding);
      } catch (err) {
        container.innerHTML = `<div class="error-msg">Could not load team. ${err.message}</div>`;
      }
    }

    function fmt1(v)  { return v != null ? Number(v).toFixed(1) : '—'; }
    function fmt3(v)  { return v != null ? Number(v).toFixed(3).replace(/^0/, '') : '—'; }
    function fmtInt(v){ return v != null ? String(v) : '—'; }

    function render(team, standing, hitting, pitching, fielding) {
      document.title = team.name;
      document.querySelector('.nav-bar__title').textContent = 'Team';

      const abbrev = (team.abbreviation ?? '').toLowerCase();
      const logoUrl = getLogoUrl(abbrev);

      const wins   = standing?.wins ?? 0;
      const losses = standing?.losses ?? 0;
      const streak = standing?.streak?.streakCode ?? '';
      const isWin  = streak.startsWith('W');
      const badgeClass = isWin ? 'streak-badge streak-badge--win' : 'streak-badge streak-badge--loss';
      const streakBadge = streak
        ? `<span class="${badgeClass}">${streak}</span>`
        : '';

      const offenseRows = [
        { label: 'RPG', value: (hitting?.runs != null && hitting?.gamesPlayed) ? (hitting.runs / hitting.gamesPlayed).toFixed(1) : '—' },
        { label: 'AVG', value: fmt3(hitting?.avg) },
        { label: 'OPS', value: fmt3(hitting?.ops) },
        { label: 'HR',  value: fmtInt(hitting?.homeRuns) },
      ];

      const defenseRows = [
        { label: 'RPGA', value: (pitching?.runs != null && pitching?.gamesPlayed) ? (pitching.runs / pitching.gamesPlayed).toFixed(1) : '—' },
        { label: 'BAA',  value: fmt3(pitching?.avg) },
        { label: 'OPSA', value: fmt3(pitching?.ops) },
        { label: 'E',    value: fmtInt(fielding?.errors) },
      ];

      const tabs = ['Schedule', 'Roster', 'Hitters', 'Pitchers', 'Advanced'];

      container.innerHTML = `
        <div class="team-header">
          <img class="team-header__logo" src="${logoUrl}" alt="${team.name} logo" onerror="this.style.display='none'">
          <div class="team-header__info">
            <div class="team-header__name">${team.name}</div>
            <div class="team-header__meta">
              <span class="team-header__record">${wins}–${losses}</span>
              ${streakBadge}
            </div>
          </div>
        </div>

        <div class="team-stats-grid">
          <div class="stats-card">
            <div class="stats-card__label">Offense</div>
            ${offenseRows.map(r => `
              <div class="stats-card__row">
                <span class="stats-card__stat-name">${r.label}</span>
                <span class="stats-card__stat-value">${r.value}</span>
              </div>`).join('')}
          </div>
          <div class="stats-card">
            <div class="stats-card__label">Defense</div>
            ${defenseRows.map(r => `
              <div class="stats-card__row">
                <span class="stats-card__stat-name">${r.label}</span>
                <span class="stats-card__stat-value">${r.value}</span>
              </div>`).join('')}
          </div>
        </div>

        <div class="team-tabs" role="tablist">
          ${tabs.map((t, i) => `
            <button class="team-tab${i === 0 ? ' team-tab--active' : ''}"
              role="tab" data-tab="${i}" aria-selected="${i === 0}">${t}</button>
          `).join('')}
        </div>

        ${tabs.map((t, i) => {
          const extraClass = i === 0 ? ' team-tab-content--schedule' : i === 1 ? ' team-tab-content--roster' : '';
          const id = i === 0 ? 'schedule-panel' : i === 1 ? 'roster-panel' : '';
          const inner = i === 0 ? '<div class="loading">Loading schedule&hellip;</div>'
                      : i === 1 ? '<div class="loading">Loading roster&hellip;</div>'
                      : `${t} coming soon`;
          return `
          <div class="team-tab-content${i === 0 ? ' team-tab-content--active' : ''}${extraClass}" data-panel="${i}"${id ? ` id="${id}"` : ''}>
            ${inner}
          </div>`;
        }).join('')}
      `;

      // Tab switching
      container.querySelectorAll('.team-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = btn.dataset.tab;
          container.querySelectorAll('.team-tab').forEach(b => {
            b.classList.toggle('team-tab--active', b.dataset.tab === idx);
            b.setAttribute('aria-selected', b.dataset.tab === idx);
          });
          container.querySelectorAll('.team-tab-content').forEach(p => {
            p.classList.toggle('team-tab-content--active', p.dataset.panel === idx);
          });
        });
      });

      // Load async tabs
      loadScheduleTab(teamId);
      loadRosterTab(teamId);
    }

    async function loadScheduleTab(teamId) {
      const panel = document.getElementById('schedule-panel');
      try {
        const games = await fetchTeamSchedule(teamId);
        if (!games.length) {
          panel.innerHTML = '<div class="empty-state" style="padding:48px 0;text-align:center">No games found.</div>';
          return;
        }
        panel.innerHTML = renderScheduleGames(games);
        const anchor = panel.querySelector('#scroll-anchor');
        if (anchor) panel.scrollTop = anchor.offsetTop - panel.offsetTop;
      } catch (err) {
        panel.innerHTML = `<div class="error-msg" style="padding:24px">Could not load schedule. ${err.message}</div>`;
      }
    }

    function scheduleTeamRow(teamData, scoreClass, scoreStr) {
      const id     = teamData.team.id;
      const abbrRaw = teamData.team.abbreviation ?? '';
      const abbr   = abbrRaw.toLowerCase();
      const name   = teamData.team.name ?? '';
      const logo   = `<img class="team-logo" src="${getLogoUrl(abbr)}" alt="" onerror="this.style.display='none'">`;
      return `
        <div class="team-row">
          <span class="team-row__abbr">${abbrRaw}</span>
          ${logo}
          <div class="team-row__info">
            <a class="team-row__name" href="/pages/team?id=${id}">${name}</a>
          </div>
          <span class="${scoreClass}">${scoreStr}</span>
        </div>`;
    }

    function renderScheduleGame(game) {
      const away = game.teams.away;
      const home = game.teams.home;
      const state = game.status?.abstractGameState;

      const awayScore = away.score ?? null;
      const homeScore = home.score ?? null;
      const awayWon = awayScore !== null && homeScore !== null && awayScore > homeScore;
      const homeWon = awayScore !== null && homeScore !== null && homeScore > awayScore;

      const awayScoreClass = awayWon ? 'team-row__score team-row__score--winner' : 'team-row__score';
      const homeScoreClass = homeWon ? 'team-row__score team-row__score--winner' : 'team-row__score';
      const awayScoreStr = awayScore !== null ? awayScore : '-';
      const homeScoreStr = homeScore !== null ? homeScore : '-';

      const gameId = game.gamePk;

      let statusHtml = '';
      let linkText = '';

      if (state === 'Live') {
        const inning = getInningDisplay(game);
        statusHtml = `
          <div class="status-label status-label--live">
            <span class="live-dot"></span> Live
          </div>
          <div class="inning-label">${inning}</div>`;
        linkText = 'Follow live &rarr;';
      } else if (state === 'Final') {
        statusHtml = `<div class="status-label">Final</div>`;
        linkText = 'Game recap &rarr;';
      } else {
        const time = getGameTime(game);
        statusHtml = `<div class="status-label">${time}</div>`;
        linkText = 'Game info &rarr;';
      }

      return `
        <div class="game-card">
          <div class="game-card__teams">
            ${scheduleTeamRow(away, awayScoreClass, awayScoreStr)}
            ${scheduleTeamRow(home, homeScoreClass, homeScoreStr)}
          </div>
          <div class="game-card__status">
            ${statusHtml}
            <a class="game-card__link" href="/pages/game?id=${gameId}">${linkText}</a>
          </div>
        </div>`;
    }

    function renderScheduleGames(games) {
      const lastFinalIdx = games.reduce((last, g, i) =>
        g.status?.abstractGameState === 'Final' ? i : last, -1);

      let html = '';
      for (let i = 0; i < games.length; i++) {
        if (i === lastFinalIdx) html += '<div id="scroll-anchor"></div>';
        html += renderScheduleGame(games[i]);
      }
      // If no final games, anchor at top
      if (lastFinalIdx === -1) html = '<div id="scroll-anchor"></div>' + html;
      return html;
    }
    async function loadRosterTab(teamId) {
      const panel = document.getElementById('roster-panel');
      try {
        const roster = await fetchRoster(teamId);
        if (!roster.length) {
          panel.innerHTML = '<div class="empty-state" style="padding:48px 0;text-align:center">No roster available.</div>';
          return;
        }
        panel.innerHTML = roster.map(renderRosterRow).join('');
      } catch (err) {
        panel.innerHTML = `<div class="error-msg" style="padding:24px">Could not load roster. ${err.message}</div>`;
      }
    }

    function renderRosterRow(entry) {
      const person = entry.person ?? {};
      const id = person.id;
      const fullName = person.fullName ?? '—';
      const jerseyNumber = entry.jerseyNumber ?? '—';
      const pos = entry.position?.abbreviation ?? '—';
      const bats = person.batSide?.code ?? '?';
      const throws = person.pitchHand?.code ?? '?';
      const age = person.currentAge ?? '—';

      const initials = fullName.split(' ').map(w => w[0]).filter(Boolean).slice(0, 2).join('');
      const headshotUrl = `https://img.mlbstatic.com/mlb-photos/image/upload/w_213,q_auto:best/v1/people/${id}/headshot/67/current`;

      return `
        <div class="roster-row">
          <div class="roster-row__headshot-wrap">
            <img class="roster-row__headshot" src="${headshotUrl}" alt=""
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="roster-row__initials">${initials}</div>
          </div>
          <span class="roster-row__number">${jerseyNumber}</span>
          <span class="roster-row__name">
            <a href="/pages/player?id=${id}">${fullName}</a>
          </span>
          <div class="roster-row__meta">
            <span class="roster-row__pos">${pos}</span>
            <span>${bats}/${throws}</span>
            <span>${age}</span>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
