<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLB Stats</title>
  <link rel="stylesheet" href="styles/main.css" />
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
</head>
<body>
  <div class="page page--home">

    <div class="home-hero">
      <div class="home-hero__title">MLB Stats</div>
      <div class="home-hero__sub">Your baseball stats hub.</div>
    </div>

    <div class="nav-grid">

      <a class="nav-card" href="/pages/schedule">
        <div class="nav-card__icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="nav-card__title">Schedule</div>
        <div class="nav-card__desc">Today's games, scores, and results.</div>
      </a>

      <a class="nav-card" href="/pages/standings">
        <div class="nav-card__icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="6"/>
            <path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/>
          </svg>
        </div>
        <div class="nav-card__title">Standings</div>
        <div class="nav-card__desc">League and division standings.</div>
      </a>

      <a class="nav-card" href="/pages/teams">
        <div class="nav-card__icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="nav-card__title">Teams</div>
        <div class="nav-card__desc">Browse all 30 MLB teams.</div>
      </a>

    </div>
  </div>

  <script type="module">
    import { initSidebar } from './components/sidebar.js';
    initSidebar();
  </script>
</body>
</html>
